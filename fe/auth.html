<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập hoặc đăng ký tài khoản Sắc Màu Di Sản.">
  <title>Đăng Nhập | DI SẢN HỒ CHÍ MINH</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens ── */
    :root {
      --primary:              #b40006;
      --primary-fixed-variant:#930004;
      --on-primary:           #ffffff;
      --secondary:            #735c00;
      --secondary-fixed:      #ffe089;
      --secondary-fixed-dim:  #f0c100;
      --on-secondary-container: #6e5700;
      --surface:              #fcf9f0;
      --surface-container-low:#f6f3ea;
      --surface-container-highest: #e5e2da;
      --on-surface:           #1c1c17;
      --on-surface-variant:   #5d403b;
      --outline:              #916f6a;
      --outline-variant:      #e6bdb7;
      --error:                #ba1a1a;
      --inverse-surface:      #31312b;
      --inverse-on-surface:   #f4f1e8;

      --font-headline: 'Playfair Display', Georgia, serif;
      --font-body:     'Be Vietnam Pro', system-ui, sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background-color: var(--surface);
      color: var(--on-surface);
      display: flex;
      flex-direction: column;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .silk-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('./assets/silk-bg.jpg');
      background-size: cover; background-position: center;
      opacity: 0.18; pointer-events: none;
    }

    /* ── Material Icons ── */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block; vertical-align: middle;
    }

    /* ── Layout ── */
    main {
      position: relative; z-index: 1;
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem;
    }
    .auth-wrapper { max-width: 28rem; width: 100%; }

    /* ── Header ── */
    .auth-header { text-align: center; margin-bottom: 3rem; }
    .auth-header a { text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    .auth-title {
      font-family: var(--font-headline);
      font-size: clamp(2.25rem, 6vw, 3rem);
      font-weight: 700; line-height: 1.15; letter-spacing: -0.02em;
      color: var(--primary);
    }

    /* ── Star Divider ── */
    .star-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 0 auto;
    }
    .star-divider::before, .star-divider::after {
      content: ""; flex: 1; height: 1px; background: var(--primary);
    }
    .star-divider .star { color: var(--secondary-fixed-dim); font-size: 1.1rem; }

    /* ── Card ── */
    .auth-card {
      position: relative; overflow: hidden;
      background: var(--surface-container-low);
      border: 1px solid var(--secondary-fixed);
      padding: 2.5rem;
      transition: border-color 0.4s, opacity 0.3s, transform 0.3s;
    }
    .auth-card:hover { border-color: var(--primary); }
    .auth-card.transitioning { opacity: 0; transform: translateY(10px); }

    /* Corner accents */
    .auth-card::before,
    .auth-card::after,
    .corner-br,
    .corner-bl {
      content: ''; position: absolute;
      width: 0.6rem; height: 0.6rem;
    }
    .auth-card::before { top: 0; left: 0; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .auth-card::after  { top: 0; right: 0; border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .corner-bl { bottom: 0; left: 0; border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

    /* ── Forms ── */
    .form-section { display: block; }
    .form-section.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    .field-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--on-surface-variant);
    }
    .field-input {
      width: 100%;
      background: transparent;
      border: none; border-bottom: 1px solid var(--outline);
      color: var(--on-surface);
      font-family: var(--font-body); font-size: 1.05rem; line-height: 1.6;
      padding: 0.5rem 0;
      outline: none; border-radius: 0;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: var(--outline-variant); }
    .field-input:focus { border-color: var(--primary); }

    .btn-submit {
      width: 100%; margin-top: 0.5rem;
      background: var(--primary); color: var(--on-primary);
      font-family: var(--font-headline); font-size: 1.25rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 1rem;
      border: none; cursor: pointer;
      transition: background 0.25s, transform 0.1s;
    }
    .btn-submit:hover { background: var(--primary-fixed-variant); }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-footer { margin-top: 2rem; text-align: center; }
    .form-footer p { font-size: 0.9rem; color: var(--on-surface-variant); }
    .toggle-btn {
      background: none; border: none; cursor: pointer;
      color: var(--primary); font-weight: 700; font-size: 0.9rem;
      margin-left: 0.25rem; font-family: var(--font-body);
      transition: text-decoration 0.15s;
    }
    .toggle-btn:hover { text-decoration: underline; }

    /* ── Error ── */
    .form-error {
      background: #ffdad6; color: var(--error);
      padding: 0.65rem 0.9rem; font-size: 0.85rem;
      margin-bottom: 1.25rem; display: none;
      border-left: 3px solid var(--error);
    }
    .form-error.show { display: block; }

    /* ── Bottom note ── */
    .auth-note {
      margin-top: 3rem; text-align: center; opacity: 0.55;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--on-surface);
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      background: var(--surface-container-highest);
      border-top: 1px solid var(--secondary-fixed);
      padding: 1rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--inverse-surface); color: var(--inverse-on-surface);
      padding: 0.75rem 1.5rem; font-size: 0.875rem;
      z-index: 200; white-space: nowrap;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-wrapper { animation: fadeUp 0.5s ease forwards; }
  </style>
</head>

<body>
  <div class="silk-bg"></div>

  <main>
    <div class="auth-wrapper">

      <!-- Header -->
      <div class="auth-header">
        <a href="/" title="Về trang chủ">
          <h1 class="auth-title">Sắc màu<br>di sản</h1>
        </a>
        <div class="star-divider">
          <span class="material-symbols-outlined star" style="font-variation-settings:'FILL' 1;">star</span>
        </div>
      </div>

      <!-- Card -->
      <div class="auth-card" id="authCard">
        <div class="corner-bl"></div>
        <div class="corner-br"></div>

        <!-- Error banner -->
        <div class="form-error" id="formError" role="alert"></div>

        <!-- ── LOGIN FORM ── -->
        <div class="form-section" id="loginSection">
          <form id="loginForm" novalidate>
            <div class="field">
              <label class="field-label" for="loginMSSV">Mã số sinh viên (MSSV)</label>
              <input class="field-input" id="loginMSSV" name="studentId"
                     type="text" placeholder="Nhập MSSV của bạn" autocomplete="off" required>
            </div>

            <button class="btn-submit" id="loginSubmit" type="submit">Đăng Nhập</button>
          </form>

          <div class="form-footer">
            <p>
              Chưa có tài khoản?
              <button class="toggle-btn" type="button" onclick="showSignup()">Đăng ký ngay</button>
            </p>
          </div>
        </div>

        <!-- ── SIGNUP FORM ── -->
        <div class="form-section hidden" id="signupSection">
          <form id="signupForm" novalidate>
            <div class="field">
              <label class="field-label" for="signupName">Họ và Tên</label>
              <input class="field-input" id="signupName" name="fullName"
                     type="text" placeholder="Nguyễn Văn A" autocomplete="name" required>
            </div>
            <div class="field">
              <label class="field-label" for="signupMSSV">Mã số sinh viên (MSSV)</label>
              <input class="field-input" id="signupMSSV" name="studentId"
                     type="text" placeholder="SE123456" autocomplete="off" required>
            </div>

            <button class="btn-submit" id="signupSubmit" type="submit">Tạo Tài Khoản</button>
          </form>

          <div class="form-footer">
            <p>
              Đã có tài khoản?
              <button class="toggle-btn" type="button" onclick="showLogin()">Đăng nhập</button>
            </p>
          </div>
        </div>
      </div>

      <p class="auth-note">Học tập và làm theo tư tưởng, đạo đức, phong cách Hồ Chí Minh</p>
    </div>
  </main>

  <footer></footer>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const STORAGE_KEY = 'sacmaudisan_participant';
    const card        = document.getElementById('authCard');
    const formError   = document.getElementById('formError');
    const toast       = document.getElementById('toast');
    let toastTimer;

    // ── If already logged in, redirect ──
    try {
      const p = JSON.parse(sessionStorage.getItem(STORAGE_KEY));
      if (p && p.id) window.location.replace('/');
    } catch {}

    // ── Toast ──
    function showToast(msg, ms = 3000) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
    }

    // ── Error ──
    function showError(msg) {
      formError.textContent = msg;
      formError.classList.add('show');
    }
    function clearError() {
      formError.classList.remove('show');
    }

    // ── Toggle animation ──
    function transition(cb) {
      card.classList.add('transitioning');
      setTimeout(() => {
        cb();
        card.classList.remove('transitioning');
        clearError();
      }, 280);
    }

    function showLogin() {
      transition(() => {
        document.getElementById('signupSection').classList.add('hidden');
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('loginMSSV').focus();
      });
    }

    function showSignup() {
      transition(() => {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('signupSection').classList.remove('hidden');
        document.getElementById('signupName').focus();
      });
    }

    // ── API call ──
    async function register(fullName, studentId) {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, studentId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Có lỗi xảy ra.');
      return data.participant;
    }

    // ── Login ── (just MSSV; name fetched from backend or asked via signup)
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      const studentId = document.getElementById('loginMSSV').value.trim().toUpperCase();
      if (!studentId) { showError('Vui lòng nhập MSSV.'); return; }

      const btn = document.getElementById('loginSubmit');
      btn.disabled = true; btn.textContent = 'Đang kiểm tra...';

      try {
        // Try to log in: call register with studentId only.
        // Backend will find existing participant. If not found yet, ask to sign up.
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName: '', studentId })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'MSSV không tồn tại trong hệ thống.');

        // If fullName is empty it means this is a new account – tell them to register
        if (!data.participant.fullName) {
          showError('MSSV chưa được đăng ký. Vui lòng tạo tài khoản mới.');
          showSignup();
          return;
        }

        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data.participant));
        showToast(`Chào mừng trở lại, ${data.participant.fullName}!`);
        setTimeout(() => window.location.replace('/lobby'), 900);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Đăng Nhập';
      }
    });

    // ── Signup ──
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      const fullName  = document.getElementById('signupName').value.trim();
      const studentId = document.getElementById('signupMSSV').value.trim().toUpperCase();

      if (!fullName)  { showError('Vui lòng nhập họ và tên.'); return; }
      if (!studentId) { showError('Vui lòng nhập MSSV.'); return; }

      const btn = document.getElementById('signupSubmit');
      btn.disabled = true; btn.textContent = 'Đang tạo tài khoản...';

      try {
        const participant = await register(fullName, studentId);
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(participant));
        showToast(`Chào mừng ${participant.fullName}! Đang chuyển trang...`);
        setTimeout(() => window.location.replace('/lobby'), 900);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Tạo Tài Khoản';
      }
    });

    // ── Input focus effect ──
    document.querySelectorAll('.field-input').forEach(input => {
      input.addEventListener('focus', () => clearError());
    });
  </script>
</body>
</html>
